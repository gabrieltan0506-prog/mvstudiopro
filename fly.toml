# fly.toml app configuration file generated for mvstudiopro on 2026-03-12T01:34:50+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mvstudiopro'
primary_region = 'sin'

[build]

[env]
  GROWTH_STORE_DIR = '/data/growth'
  GROWTH_LEGACY_STORE_FILE = '/data/growth-trends.json'
  NODE_OPTIONS = '--max-old-space-size=4096'
  DOUYIN_CREATOR_CENTER_ENABLED = '0'
  DOUYIN_CREATOR_INDEX_ENABLED = '0'
  DISABLE_GROWTH_TREND_SCHEDULER = '0'
  GROWTH_ENABLE_BACKFILL_BOOTSTRAP = '1'
  GROWTH_ENABLE_LIVE_BACKFILL_BOOTSTRAP = '1'
  GROWTH_WRITE_DERIVED_PLATFORM_FILES = '1'
  GROWTH_DISABLE_HISTORY_LEDGER_UPDATES = '0'
  GROWTH_MAIL_DIGEST_INTERVAL_MINUTES = '15'
  GROWTH_GITHUB_COLD_STORE_BASE_URL = 'https://github.com/gabrieltan0506-prog/mvstudiopro/releases/download/growth-cold-store-latest'
  GROWTH_OFFLOAD_SINGLE_FILE_THRESHOLD_MB = '400'
  GROWTH_OFFLOAD_DIRECTORY_THRESHOLD_MB = '800'
  GROWTH_OFFLOAD_HOT_DATA_THRESHOLD_MB = '900'
  GROWTH_SCHEDULER_INTERVAL_MINUTES = '30'
  GROWTH_BURST_INTERVAL_MINUTES = '10'
  GROWTH_HISTORY_BACKFILL_WINDOW_DAYS = '90'
  GROWTH_BACKFILL_STEP_TARGET = '3'
  GROWTH_BACKFILL_STEP_FALLBACK = '2'
  GROWTH_LIVE_BACKFILL_STEP_TARGET = '5'
  GROWTH_LIVE_BACKFILL_STEP_FALLBACK = '3'
  GROWTH_HISTORY_LEDGER_BATCH_ROUNDS = '6'
  GROWTH_BACKFILL_STORE_SIZE_LIMIT_MB = '512'
  GROWTH_FORCE_BURST_PLATFORMS = 'douyin,kuaishou,bilibili,xiaohongshu,toutiao'
  GROWTH_FORCE_BURST_UNTIL = '2026-03-27T23:59:59+08:00'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    timeout = "10s"
    path = "/api/health"

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 4096

[[mounts]]
  source = 'growth_data'
  destination = '/data'
