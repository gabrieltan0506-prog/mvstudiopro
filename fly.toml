# fly.toml app configuration file generated for mvstudiopro on 2026-03-12T01:34:50+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mvstudiopro'
primary_region = 'sin'

[build]

[env]
  GROWTH_STORE_DIR = '/data/growth'
  GROWTH_LEGACY_STORE_FILE = '/data/growth-trends.json'
  NODE_OPTIONS = '--max-old-space-size=4096'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    timeout = "10s"
    path = "/api/health"

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 4096

[[mounts]]
  source = 'growth_data'
  destination = '/data'
