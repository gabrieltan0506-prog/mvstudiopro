# fly.toml app configuration file generated for mvstudiopro on 2026-03-12T01:34:50+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mvstudiopro'
primary_region = 'sin'  # 新加坡 · 持久卷 growth_data 与运行中机器实际所在地（亚洲用户低延迟）

[build]

[env]
  GROWTH_STORE_DIR = '/data/growth'
  GROWTH_LEGACY_STORE_FILE = '/data/growth-trends.json'
  # 10GB VM：V8 堆須單獨調大；僅升 Fly RAM 不改此值仍會在舊上限觸頂 OOM。
  # 8GB 堆 + ~2GB 非堆（讀檔、Chromium、原生）；仍吃緊時宜縮快照或再升 VM。
  NODE_OPTIONS = '--max-old-space-size=8192'
  DOUYIN_CREATOR_CENTER_ENABLED = '0'
  DOUYIN_CREATOR_INDEX_ENABLED = '0'
  DISABLE_GROWTH_TREND_SCHEDULER = '0'
  GROWTH_ENABLE_BACKFILL_BOOTSTRAP = '1'
  GROWTH_ENABLE_LIVE_BACKFILL_BOOTSTRAP = '1'
  GROWTH_WRITE_DERIVED_PLATFORM_FILES = '1'
  GROWTH_DISABLE_HISTORY_LEDGER_UPDATES = '0'
  GROWTH_MAIL_DIGEST_INTERVAL_MINUTES = '15'
  GROWTH_GITHUB_COLD_STORE_BASE_URL = 'https://github.com/gabrieltan0506-prog/mvstudiopro/releases/download/growth-cold-store-latest'
  GROWTH_OFFLOAD_SINGLE_FILE_THRESHOLD_MB = '400'
  GROWTH_OFFLOAD_DIRECTORY_THRESHOLD_MB = '800'
  GROWTH_OFFLOAD_HOT_DATA_THRESHOLD_MB = '800'
  GROWTH_SCHEDULER_INTERVAL_MINUTES = '30'
  GROWTH_SCHEDULER_CONCURRENCY = '1'
  GROWTH_BURST_INTERVAL_MINUTES = '15'
  GROWTH_PLATFORM_RUN_TIMEOUT_MS = '600000'
  GROWTH_DOUYIN_PLATFORM_RUN_TIMEOUT_MS = '600000'
  GROWTH_KUAISHOU_PLATFORM_RUN_TIMEOUT_MS = '600000'
  GROWTH_BACKFILL_PLATFORM_TIMEOUT_MS = '600000'
  GROWTH_LIVE_WINDOW_START_HOUR = '7'
  GROWTH_LIVE_WINDOW_END_HOUR = '1'
  GROWTH_BACKFILL_WINDOW_START_HOUR = '1'
  GROWTH_BACKFILL_WINDOW_END_HOUR = '6'
  GROWTH_BACKFILL_ACTIVE_INTERVAL_MS = '1200000'
  GROWTH_HISTORY_BACKFILL_WINDOW_DAYS = '45'
  GROWTH_BACKFILL_STEP_TARGET = '2'
  GROWTH_BACKFILL_STEP_FALLBACK = '1'
  GROWTH_LIVE_BACKFILL_STEP_TARGET = '2'
  GROWTH_LIVE_BACKFILL_STEP_FALLBACK = '1'
  GROWTH_HISTORY_LEDGER_BATCH_ROUNDS = '3'
  GROWTH_BACKFILL_STORE_SIZE_LIMIT_MB = '512'
  GROWTH_FORCE_BURST_PLATFORMS = ''
  GROWTH_FORCE_BURST_UNTIL = ''
  DOUYIN_TREND_PAGES = '12'
  KUAISHOU_PRIVATE_PAGES = '2'
  KUAISHOU_PRIVATE_CONCURRENCY = '1'
  KUAISHOU_TREND_PAGES = '8'
  KUAISHOU_SEARCH_PAGES = '4'
  KUAISHOU_SEARCH_CONCURRENCY = '1'
  KUAISHOU_SEARCH_USER_PAGES = '2'
  KUAISHOU_SEARCH_USER_LIMIT = '10'
  KUAISHOU_SEARCH_USER_KEYWORD_LIMIT = '6'
  KUAISHOU_TREND_KEYWORD_LIMIT = '16'
  GROWTH_BILIBILI_TREND_PAGES = '4'
  GROWTH_BILIBILI_SEARCH_PAGES = '1'
  GROWTH_BILIBILI_SEARCH_KEYWORD_LIMIT = '8'
  BILIBILI_SEARCH_ORDERS = 'click'
  GROWTH_XHS_TREND_PAGES = '8'
  GROWTH_XHS_SEARCH_KEYWORD_LIMIT = '14'
  GROWTH_XHS_SEARCH_PAGES = '5'
  GROWTH_XHS_COMMENT_SAMPLE_ITEMS = '5'
  GROWTH_XHS_COMMENT_SAMPLE_LIMIT = '5'
  GROWTH_XHS_CONCURRENCY = '2'
  XHS_SEARCH_SORTS = 'general'
  GROWTH_TOUTIAO_SEARCH_KEYWORD_LIMIT = '6'
  GROWTH_TOUTIAO_SEARCH_PAGES = '2'
  GROWTH_TOUTIAO_SEARCH_CONCURRENCY = '1'
  GROWTH_TOUTIAO_AUTHOR_LIMIT = '4'
  GROWTH_TOUTIAO_PROFILE_PAGES = '2'
  GROWTH_SCHEDULER_STALE_FORCE_RUN_MS = '1200000'
  GCS_PDF_EXPORT_BUCKET = 'mv-studio-pro-vertex-video-temp'
  # 平台選題封面/2×4：預設 GCS。若要 Fly 卷請設 PLATFORM_TOPIC_IMAGE_USE_FLY_VOLUME=1（勿依賴 PLATFORM_TOPIC_IMAGE_STORAGE）。
  PUPPETEER_EXECUTABLE_PATH = '/usr/bin/chromium'

[deploy]
  strategy = "rolling"
  wait_timeout = "5m"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']
  # Fly 平台限制：http_service.http_options.idle_timeout 最大 900（秒）。超過會部署失败。
  # 同步 tRPC「mvAnalysis.getPlatformContent」Stage2 LLM 若超過 ~845s 無回包，边缘会 502；见 PLATFORM_STAGE2_SYNC_TIMEOUT_MS / routers 内 Fly 封顶。
  # 超长 PDF 請走異步隊列（GCS + pdf_export），勿依賴單條 HTTP 閒置連接撐 30+ 分鐘。
  [http_service.http_options]
    idle_timeout = 900

  [[http_service.checks]]
    # 冷啟：依賴遷移、trend scheduler、job worker 掛載；過短易「還在 listen 前就 fail」→ 502 / rolling 部署抖動
    grace_period = "180s"
    interval = "15s"
    method = "GET"
    timeout = "10s"
    path = "/api/health"

[[vm]]
  memory = '10gb'
  cpu_kind = 'performance'
  cpus = 4
  memory_mb = 10240

[[mounts]]
  source = 'growth_data'
  destination = '/data'
