# 自动部署 pdf-worker 到 Cloud Run。
# 触发条件：main 分支上 pdf-worker/ 目录有任何改动 push（含 PR merge）。
#
# Secrets 要求（Repo settings → Secrets and variables → Actions）任选一种：
#
# A) 服务账号 JSON（常用）— 任填其一：
#   GCP_SA_KEY                — 优先读取
#   GCP_SERVICE_ACCOUNT_KEY   — 备用名（与部分团队习惯命名一致）
#   整份 key JSON 单行或多行均可。未设置或为空时 auth 会报：
#   「must specify exactly one of workload_identity_provider or credentials_json」。
#   注意：来自 fork 的 pull_request 默认拿不到本仓库 secrets；本 workflow 仅在
#   push main / workflow_dispatch 运行；Fork PR 需在合并进本仓库后由 main 部署。
#
# B) Workload Identity Federation（无长期 JSON key）
#   须改本文件 auth 步骤：使用 workload_identity_provider + service_account，
#   并移除 credentials_json（须二选一）。
#
#   服务账号建议角色（与旧注释一致）：
#                   - roles/run.admin
#                   - roles/cloudbuild.builds.editor
#                   - roles/artifactregistry.writer
#                   - roles/storage.admin (上传源码到 staging bucket)
#                   - roles/iam.serviceAccountUser (allow act-as pdf-runner)
#                 若用 JSON key：`gcloud iam service-accounts keys create key.json --iam-account=...`
#                 将整份 JSON 粘贴到 GCP_SA_KEY（或 GCP_SERVICE_ACCOUNT_KEY）。

name: Deploy pdf-worker

on:
  push:
    branches:
      - main
    paths:
      - "pdf-worker/**"
      - ".github/workflows/pdf-worker-deploy.yml"

  # 手动触发兜底：万一 secret 没配好或临时跳过 path filter，可以从 Actions 页面
  # 点 "Run workflow" 强制部署。
  workflow_dispatch:

jobs:
  deploy:
    name: Build + deploy pdf-worker to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation 需要；仅 credentials_json 时无妨
    concurrency:
      group: pdf-worker-deploy-${{ github.ref }}
      cancel-in-progress: true
    env:
      PROJECT_ID: mv-studio-pro
      PROJECT_NUM: "255451353515"
      REGION: us-central1
      SERVICE_NAME: pdf-service
      SA_EMAIL: pdf-runner@mv-studio-pro.iam.gserviceaccount.com
    steps:
      - uses: actions/checkout@v4

      - name: Verify GCP service account secret is set
        env:
          KEY_A: ${{ secrets.GCP_SA_KEY }}
          KEY_B: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -n "$KEY_A" ] || [ -n "$KEY_B" ]; then
            echo "GCP credentials secret is present (GCP_SA_KEY and/or GCP_SERVICE_ACCOUNT_KEY)."
          else
            echo "::error::未配置 GCP 凭证。请在仓库 Secrets 中新增 GCP_SA_KEY（或 GCP_SERVICE_ACCOUNT_KEY），值为服务账号 JSON 全文。"
            echo "参见 workflow 文件顶部注释；勿用占位符。Fork PR 默认无 secrets，需合并进本仓库后在 main 上部署。"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY || secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Compute image URL
        id: image
        run: |
          IMAGE_URL="${REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${SERVICE_NAME}:sha-${GITHUB_SHA}"
          echo "url=$IMAGE_URL" >> "$GITHUB_OUTPUT"
          echo "Image: $IMAGE_URL"

      - name: Build image via Cloud Build
        working-directory: pdf-worker
        run: |
          BUCKET_NAME="gs://${PROJECT_ID}-build-stash-${PROJECT_NUM}"
          gcloud builds submit --tag "${{ steps.image.outputs.url }}" \
            --gcs-source-staging-dir="${BUCKET_NAME}/source" \
            --service-account="projects/${PROJECT_ID}/serviceAccounts/${SA_EMAIL}" \
            --gcs-log-dir="${BUCKET_NAME}/logs"

      - name: Deploy to Cloud Run
        run: |
          # 与 pdf-worker/deploy.sh 同步：4Gi / 4 vCPU / 3600s（Cloud Run HTTP 上限）。
          gcloud run deploy "${SERVICE_NAME}" \
            --image "${{ steps.image.outputs.url }}" \
            --region "${REGION}" \
            --allow-unauthenticated \
            --memory 4Gi \
            --cpu 4 \
            --timeout=3600 \
            --service-account="${SA_EMAIL}"

      - name: Smoke check service URL
        run: |
          URL=$(gcloud run services describe "${SERVICE_NAME}" --region="${REGION}" --format='value(status.url)')
          echo "pdf-worker deployed at: $URL"
          # 不做实际 PDF 渲染（耗时太长 + 体积大），只 ping 健康。
          curl -fsS -m 10 "$URL/health" || echo "⚠️ /health endpoint missing (non-fatal)"
