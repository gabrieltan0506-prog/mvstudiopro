name: Growth Archive Offload

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  offload:
    name: Offload old growth archive shards from Fly
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Build offload list from Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          mkdir -p /tmp/growth-archive-offload
          flyctl ssh console -a mvstudiopro -C "sh -lc '
            cd /data/growth/archive || exit 0
            find . -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort > /tmp/archive-all-dirs.txt
            awk '\''/^[0-9]{4}-[0-9]{2}-[0-9]{2}$/'\'' /tmp/archive-all-dirs.txt | sort > /tmp/archive-date-dirs.txt
            head -n -2 /tmp/archive-date-dirs.txt > /tmp/archive-offload-date-dirs.txt || true
            grep -v -E '\''^[0-9]{4}-[0-9]{2}-[0-9]{2}$'\'' /tmp/archive-all-dirs.txt > /tmp/archive-offload-other-dirs.txt || true
            cat /tmp/archive-offload-date-dirs.txt /tmp/archive-offload-other-dirs.txt | sed '\''/^[[:space:]]*$/d'\'' > /tmp/archive-offload-dirs.txt
            avail=$(df -B1 /data | awk '\''NR==2{print $4}'\'')
            target=$((900 * 1024 * 1024))
            if [ ! -s /tmp/archive-offload-dirs.txt ] && [ -s /tmp/archive-date-dirs.txt ] && [ ${avail:-0} -lt $target ]; then
              need=$((target - avail))
              : > /tmp/archive-offload-dirs.txt
              while IFS= read -r dir; do
                [ -n "$dir" ] || continue
                echo $dir >> /tmp/archive-offload-dirs.txt
                size=$(du -sb $dir 2>/dev/null | awk '\''{print $1}'\'')
                need=$((need - ${size:-0}))
                if [ $need -le 0 ]; then
                  break
                fi
              done < /tmp/archive-date-dirs.txt
            fi
            sort -u /tmp/archive-offload-dirs.txt -o /tmp/archive-offload-dirs.txt
            cat /tmp/archive-offload-dirs.txt
          '" > /tmp/growth-archive-offload/dirs.txt
          date -u +"%Y-%m-%dT%H:%M:%SZ" > /tmp/growth-archive-offload/fetched-at.txt
          node <<'NODE'
          const fs = require("fs");
          const dirsPath = "/tmp/growth-archive-offload/dirs.txt";
          const dirs = fs.existsSync(dirsPath)
            ? fs.readFileSync(dirsPath,"utf8").split(/\r?\n/).map((s)=>s.trim()).filter(Boolean)
            : [];
          const manifest = {
            createdAt: new Date().toISOString(),
            baseUrl: "https://github.com/gabrieltan0506-prog/mvstudiopro/releases/download/growth-cold-store-latest",
            archiveDirs: dirs,
            thresholdsMb: {
              singleFile: 400,
              directory: 800,
              hotData: 800,
              availableSpaceTrigger: 800,
              targetAvailableSpace: 900
            }
          };
          fs.writeFileSync("/tmp/growth-archive-offload/offload-manifest.json", JSON.stringify(manifest, null, 2));
          NODE
      - name: Stream archive shard bundle from Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ ! -s /tmp/growth-archive-offload/dirs.txt ]; then
            echo "No archive shards to offload"
            touch /tmp/growth-archive-offload/EMPTY
            exit 0
          fi
          tr '\n' ' ' < /tmp/growth-archive-offload/dirs.txt > /tmp/growth-archive-offload/dirs.inline
          dirs=$(cat /tmp/growth-archive-offload/dirs.inline)
          flyctl ssh console -a mvstudiopro -C "sh -lc 'cd /data/growth/archive && tar -czf - $dirs'" > /tmp/growth-archive-offload/archive-shards.tar.gz
          mkdir -p /tmp/growth-archive-offload/assets
          while IFS= read -r dir; do
            [ -n "$dir" ] || continue
            flyctl ssh console -a mvstudiopro -C "sh -lc 'cd /data/growth/archive && tar -czf - $dir'" > "/tmp/growth-archive-offload/assets/archive-$dir.tar.gz"
          done < /tmp/growth-archive-offload/dirs.txt
      - name: Upload GitHub archive offload artifact
        uses: actions/upload-artifact@v4
        with:
          name: growth-archive-offload-${{ github.run_id }}
          path: /tmp/growth-archive-offload
          if-no-files-found: error
          retention-days: 30
      - name: Publish archive offload bundles
        if: hashFiles('/tmp/growth-archive-offload/EMPTY') == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -f /tmp/growth-archive-offload/offload-manifest.json
          gh release view growth-cold-store-latest >/dev/null 2>&1 || \
            gh release create growth-cold-store-latest --title "Growth Cold Store Latest" --notes "Latest cold-store restore assets"
          gh release upload growth-cold-store-latest /tmp/growth-archive-offload/offload-manifest.json#offload-manifest.json --clobber
          for file in /tmp/growth-archive-offload/assets/*.tar.gz; do
            [ -f "$file" ] || continue
            gh release upload growth-cold-store-latest "$file#$(basename "$file")" --clobber
          done
      - name: Delete offloaded shards from Fly
        if: hashFiles('/tmp/growth-archive-offload/EMPTY') == ''
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          while IFS= read -r dir; do
            [ -n "$dir" ] || continue
            flyctl ssh console -a mvstudiopro -C "rm -rf /data/growth/archive/$dir"
          done < /tmp/growth-archive-offload/dirs.txt
