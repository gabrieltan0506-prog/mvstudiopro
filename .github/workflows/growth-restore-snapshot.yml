name: Growth Restore Snapshot

on:
  workflow_dispatch:
    inputs:
      snapshot_asset_url:
        description: Snapshot tar.gz URL
        required: true
        default: https://github.com/gabrieltan0506-prog/mvstudiopro/releases/download/growth-recovery-20260323/snapshot-20260323.tar.gz
      cold_restore_manifest_url:
        description: Optional cold-restore manifest URL
        required: false
        default: https://github.com/gabrieltan0506-prog/mvstudiopro/releases/download/growth-cold-store-latest/cold-restore-manifest.json

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Download snapshot asset
        run: |
          rm -rf /tmp/growth-restore
          mkdir -p /tmp/growth-restore
          curl -L "${{ inputs.snapshot_asset_url }}" -o /tmp/growth-restore/snapshot.tar.gz
          tar -xzf /tmp/growth-restore/snapshot.tar.gz -C /tmp/growth-restore
          ls -lah /tmp/growth-restore

      - name: Restore externalized cold-store assets
        run: |
          MANIFEST_URL="${{ inputs.cold_restore_manifest_url }}"
          if [ -z "$MANIFEST_URL" ]; then
            echo "No cold restore manifest URL provided"
            exit 0
          fi
          if ! curl -fsSL "$MANIFEST_URL" -o /tmp/growth-restore/cold-restore-manifest.json; then
            echo "Cold restore manifest not found, continue with snapshot only"
            exit 0
          fi
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const manifest = JSON.parse(fs.readFileSync("/tmp/growth-restore/cold-restore-manifest.json", "utf8"));
          const rootCandidates = [
            "/tmp/growth-restore",
            "/tmp/growth-restore/snapshot",
          ];
          const root = rootCandidates.find((dir) => fs.existsSync(path.join(dir, "current.json")));
          if (!root) {
            throw new Error(`Snapshot root not found under: ${rootCandidates.join(", ")}`);
          }
          const segments = [];
          if (manifest?.externalSegments?.platforms?.asset) {
            segments.push({ key: "platforms", asset: manifest.externalSegments.platforms.asset, required: Boolean(manifest.externalSegments.platforms.required) });
          }
          if (manifest?.externalSegments?.historyLedger?.asset) {
            segments.push({ key: "historyLedger", asset: manifest.externalSegments.historyLedger.asset, required: Boolean(manifest.externalSegments.historyLedger.required) });
          }
          if (manifest?.externalSegments?.platformCurrent?.asset) {
            segments.push({ key: "platformCurrent", asset: manifest.externalSegments.platformCurrent.asset, required: Boolean(manifest.externalSegments.platformCurrent.required) });
          }
          fs.writeFileSync("/tmp/growth-restore/external-segments.json", JSON.stringify({ root, baseUrl: manifest.baseUrl, segments }, null, 2));
          NODE
          jq -c '.segments[]?' /tmp/growth-restore/external-segments.json | while read -r segment; do
            asset=$(echo "$segment" | jq -r '.asset')
            required=$(echo "$segment" | jq -r '.required')
            base_url=$(jq -r '.baseUrl' /tmp/growth-restore/external-segments.json)
            root=$(jq -r '.root' /tmp/growth-restore/external-segments.json)
            target="/tmp/growth-restore/$asset"
            if curl -fsSL "$base_url/$asset" -o "$target"; then
              tar -xzf "$target" -C "$root"
            elif [ "$required" = "true" ]; then
              echo "Missing required cold-store asset: $asset"
              exit 1
            else
              echo "Optional cold-store asset missing: $asset"
            fi
          done

      - name: Sanitize snapshot runtime state
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const candidateRoots = [
            "/tmp/growth-restore",
            "/tmp/growth-restore/snapshot",
          ];
          const root = candidateRoots.find((dir) => fs.existsSync(path.join(dir, "current.json")));
          if (!root) {
            throw new Error(`Snapshot root not found under: ${candidateRoots.join(", ")}`);
          }
          const currentPath = path.join(root, "current.json");
          const runtimeMetaPath = path.join(root, "runtime-meta.json");

          const cleanBackfill = (value) => {
            if (!value || typeof value !== "object") return value;
            const next = { ...value };
            delete next.backfill;
            return next;
          };

          const current = JSON.parse(fs.readFileSync(currentPath, "utf8"));
          delete current.backfill;
          delete current.backfillLive;
          delete current.backfillHistory;
          fs.writeFileSync(currentPath, JSON.stringify(current, null, 2));

          if (fs.existsSync(runtimeMetaPath)) {
            const runtimeMeta = cleanBackfill(JSON.parse(fs.readFileSync(runtimeMetaPath, "utf8")));
            fs.writeFileSync(runtimeMetaPath, JSON.stringify(runtimeMeta, null, 2));
          }
          NODE

      - name: Prepare Fly temp directory
        run: |
          flyctl ssh console -a mvstudiopro --command "sh -lc 'rm -rf /tmp/growth-restore-input'"

      - name: Upload snapshot to Fly temp
        run: |
          if [ -f /tmp/growth-restore/current.json ]; then
            SOURCE_DIR=/tmp/growth-restore
          else
            SOURCE_DIR=/tmp/growth-restore/snapshot
          fi
          flyctl ssh sftp put -a mvstudiopro -R "$SOURCE_DIR" /tmp/growth-restore-input

      - name: Build remote restore script
        run: |
          cat >/tmp/restore-growth-snapshot.sh <<'SH'
          #!/bin/sh
          set -eu

          STORE=/data/growth
          SNAP=/tmp/growth-restore-input
          STAMP=$(date +%Y%m%dT%H%M%S)
          BACKUP="$STORE/restore-temp/writeback-$STAMP"

          mkdir -p "$STORE/restore-temp"
          mkdir -p "$STORE/backups"
          mkdir -p "$BACKUP"

          for file in current.json archive-index.json history-summary.json runtime-meta.json; do
            if [ -f "$STORE/$file" ]; then
              cp "$STORE/$file" "$BACKUP/$file"
            fi
          done

          if [ -d "$STORE/platforms" ]; then
            cp -R "$STORE/platforms" "$BACKUP/"
          fi

          if [ -f "$STORE/backups/growth-debug-summary.json" ]; then
            cp "$STORE/backups/growth-debug-summary.json" "$BACKUP/growth-debug-summary.json"
          fi

          cp "$SNAP/current.json" "$STORE/current.json.next"
          cp "$SNAP/archive-index.json" "$STORE/archive-index.json.next"
          cp "$SNAP/history-summary.json" "$STORE/history-summary.json.next"

          rm -rf "$STORE/platforms.next"
          cp -R "$SNAP/platforms" "$STORE/platforms.next"

          mv "$STORE/current.json.next" "$STORE/current.json"
          mv "$STORE/archive-index.json.next" "$STORE/archive-index.json"
          mv "$STORE/history-summary.json.next" "$STORE/history-summary.json"

          rm -rf "$STORE/platforms.prev"
          if [ -d "$STORE/platforms" ]; then
            mv "$STORE/platforms" "$STORE/platforms.prev"
          fi
          mv "$STORE/platforms.next" "$STORE/platforms"
          rm -rf "$STORE/platform-current"
          rm -f "$STORE/platform-current-manifest.json"

          node -e 'const fs=require("fs");const p="/data/growth/runtime-meta.json";const d=JSON.parse(fs.readFileSync(p,"utf8"));delete d.backfill;fs.writeFileSync(p+".next", JSON.stringify(d,null,2));fs.renameSync(p+".next", p);'

          if [ -f "$SNAP/backups/growth-debug-summary.json" ]; then
            cp "$SNAP/backups/growth-debug-summary.json" "$STORE/backups/growth-debug-summary.json"
          fi

          cd /app
          ./node_modules/.bin/tsx scripts/refresh-growth-debug-summary.ts >/tmp/growth-restore-debug-summary.json

          echo restored
          SH
          chmod +x /tmp/restore-growth-snapshot.sh

      - name: Upload remote restore script
        run: |
          flyctl ssh sftp put -a mvstudiopro /tmp/restore-growth-snapshot.sh /tmp/restore-growth-snapshot.sh

      - name: Restore snapshot into Fly store
        run: |
          flyctl ssh console -a mvstudiopro --command "sh /tmp/restore-growth-snapshot.sh"

      - name: Verify restored files
        run: |
          flyctl ssh console -a mvstudiopro --command "sh -lc '
            ls -lah /data/growth | sed -n \"1,40p\"
            echo ---
            ls -lah /data/growth/platforms | sed -n \"1,20p\"
            echo ---
            grep -n \"backfill\" /data/growth/runtime-meta.json || true
            echo ---
            sed -n \"1,80p\" /tmp/growth-restore-debug-summary.json
          '"
