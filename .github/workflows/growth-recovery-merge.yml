name: Growth Recovery Merge

on:
  workflow_dispatch:
    inputs:
      recovery_asset_url:
        description: Recovery gzip URL
        required: true
        default: https://github.com/gabrieltan0506-prog/mvstudiopro/releases/download/growth-recovery-20260321/final-merge-writeback-20260321.json.gz

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Download recovery asset
        run: |
          curl -L "${{ inputs.recovery_asset_url }}" -o recovered.json.gz
          gzip -df recovered.json.gz

      - name: Merge snapshots
        run: |
          cp recovered.json merged-current.json

      - name: Compress merged snapshot
        run: |
          gzip -c merged-current.json > merged-current.json.gz
          ls -lh merged-current.json merged-current.json.gz

      - name: Upload merged artifact to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload growth-recovery-20260321 merged-current.json.gz#final-merge-writeback-20260321-merged.json.gz --clobber

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: growth-recovery-merged
          path: |
            merged-current.json
            merged-current.json.gz
